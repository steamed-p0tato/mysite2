<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariyan Basu</title>
    <link rel="stylesheet" href="style.css">
    <script>if(sessionStorage.getItem('theme')==='dark')document.documentElement.dataset.theme='dark';</script>
    <script src="theme.js" defer></script>
</head>
<body class="page-home">

    <div class="container split">

        <header class="header">
            <div class="logo">
                <h1>Ariyan Basu</h1>
            </div>
            <nav class="nav">
                <a href="about.html" class="active">about</a>
                <a href="blog.html">blog</a>
                <a href="gear.html">gear</a>
                <a href="https://github.com/steamed-p0tato" target="_blank" rel="noopener noreferrer">github</a>
                <a href="https://huggingface.co/steamed-potatop" target="_blank" rel="noopener noreferrer">huggingface</a>
                <a href="contact.html">contact</a>
                <a href="course/index.html">course</a>
                <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Switch to dark mode" title="Switch to dark mode">☾</button>
            </nav>
        </header>

        <aside class="left-col">
            <h2>LOCAL TIME</h2>
            <span id="timezone">
                <i>TIME IN CALCUTTA - <span id="time">Loading...</span> IST</i>
            </span>
        </aside>

        <main class="center-col">
            <img src="3.jpg" alt="Ariyan Basu" class="main-image">
        </main>

    </div>

    <script type="text/javascript">
        // Declare time zone formatting for India
        const options = {
            timeZone: 'Asia/Kolkata',
            hour: 'numeric',
            minute: 'numeric',
            second: 'numeric',
            hour12: true
        };
        
        const formatter = new Intl.DateTimeFormat('en-IN', options);

        // Update time function
        function updateTime() {
            const timeElement = document.querySelector("#time");
            if (timeElement) {
                timeElement.innerText = formatter.format(new Date());
            }
        }

        // Initial call
        updateTime();
        
        // Set interval to update every second
        setInterval(updateTime, 1000);
    </script>

</body>
</html>
